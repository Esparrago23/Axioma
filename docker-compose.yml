version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: axioma_db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - ./backend/.env  
    ports:
      - "5432:5432" 
    networks:
      - axioma_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U Chpaladin -d axioma_db"]
      interval: 5s
      timeout: 5s
      retries: 5


  api:
    build:
      context: ./backend 
      dockerfile: Dockerfile
    container_name: axioma_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app 
                       
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy 
    networks:
      - axioma_net

  minio:
    image: minio/minio:latest
    container_name: axioma_minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - axioma_net

  minio-setup:
    image: minio/mc:latest
    container_name: axioma_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadminpassword;
      /usr/bin/mc mb myminio/axioma-bucket || true;
      /usr/bin/mc anonymous set download myminio/axioma-bucket;
      exit 0;
      "
    networks:
      - axioma_net


volumes:
  postgres_data:
  minio_data:


networks:
  axioma_net:
    driver: bridge